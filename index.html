<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZORCON CONTABILIDADE E ASSESSORIA LTDA</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        p.description {
            font-size: 18px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .contact-info {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            display: inline-block;
        }
        .contact-info p {
            margin: 5px 0;
            font-weight: bold;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ZORCON CONTABILIDADE E ASSESSORIA LTDA</h1>
        <p class="description">Atividades de contabilidade</p>
        
        <div class="contact-info">
            <p>Contato</p>
            <a href="mailto:contabil04@zorconcontabilidade.com.br">contabil04@zorconcontabilidade.com.br</a>
        </div>
    </div>

</body>
</html>
